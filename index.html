<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="健身手册">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1116">
<title>我的健身手册</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#161b22;
    --panel-2:#1c232d;
    --line:#2a323d;
    --text:#e6edf3;
    --muted:#8b949e;
    --accent:#f0883e;
    --accent-2:#3fb950;
    --blue:#58a6ff;
    --pink:#db61a2;
    --danger:#f85149;
    --radius:16px;
    --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#1d2430 0,var(--bg) 60%);
    color:var(--text);min-height:100vh;
  }
  header{
    padding:30px 24px 14px;max-width:1200px;margin:0 auto;
    display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;
  }
  header h1{margin:0;font-size:28px;letter-spacing:1px;display:flex;align-items:center;gap:12px}
  header .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .stats{display:flex;gap:10px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 14px;text-align:center;min-width:78px}
  .stat b{display:block;font-size:20px;color:var(--accent)}
  .stat span{font-size:11px;color:var(--muted)}

  .wrap{max-width:1200px;margin:0 auto;padding:8px 24px 80px}
  .tabs{display:flex;gap:8px;margin:10px 0 22px;flex-wrap:wrap}
  .tab{
    cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:10px 20px;border-radius:999px;font-size:15px;font-weight:600;transition:.18s;display:flex;align-items:center;gap:8px;
  }
  .tab:hover{border-color:var(--accent)}
  .tab.active{background:linear-gradient(135deg,var(--accent),#d96a25);border-color:transparent;color:#1a1206}
  .tab .cnt{font-size:12px;background:rgba(255,255,255,.18);border-radius:999px;padding:1px 8px}
  .tab.active .cnt{background:rgba(0,0,0,.18)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:.18s;position:relative;
  }
  .card:hover{transform:translateY(-3px);border-color:#3a4452;box-shadow:var(--shadow)}
  .thumb{
    height:160px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;cursor:pointer;
  }
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb svg{width:90px;height:90px}
  .thumb .upload-hint{
    position:absolute;inset:0;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:.18s;font-size:13px;gap:6px;
  }
  .thumb:hover .upload-hint{opacity:1}
  .card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .card-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card-title h3{margin:0;font-size:17px}
  .weight{
    background:rgba(63,185,80,.14);color:var(--accent-2);border:1px solid rgba(63,185,80,.3);
    padding:3px 10px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;
  }
  .target{
    background:rgba(219,97,162,.14);color:var(--pink);border:1px solid rgba(219,97,162,.3);
    padding:5px 10px;border-radius:9px;font-size:12px;line-height:1.5;
  }
  .target b{color:#f0a8cf}
  .notes{font-size:13px;color:var(--muted);line-height:1.6;flex:1}
  .notes .label{color:var(--accent);font-weight:600;font-size:12px;display:block;margin-bottom:2px}
  .last-log{font-size:12px;color:var(--blue);background:rgba(88,166,255,.1);border-radius:8px;padding:5px 9px;display:flex;align-items:center;gap:6px}
  .card-actions{display:flex;gap:8px;margin-top:4px}
  .card-actions button{
    flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
    padding:7px;border-radius:9px;cursor:pointer;font-size:13px;transition:.15s;
  }
  .card-actions button:hover{color:var(--text);border-color:#475061}
  .card-actions .log:hover{color:var(--blue);border-color:var(--blue)}
  .card-actions .del:hover{color:var(--danger);border-color:var(--danger)}

  .add-card{
    border:2px dashed var(--line);border-radius:var(--radius);background:transparent;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;
    min-height:300px;transition:.18s;font-size:15px;
  }
  .add-card:hover{border-color:var(--accent);color:var(--accent)}
  .add-card .plus{font-size:42px;line-height:1}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:20px;width:100%;max-width:480px;
    padding:24px;box-shadow:var(--shadow);max-height:92vh;overflow:auto;
  }
  .modal h2{margin:0 0 18px;font-size:20px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field textarea,.field select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:11px 12px;border-radius:10px;font-size:14px;font-family:inherit;
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:70px;line-height:1.6}
  .preview-box{
    height:140px;border:1px solid var(--line);border-radius:12px;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:8px;position:relative;
  }
  .preview-box img{width:100%;height:100%;object-fit:cover}
  .preview-box svg{width:80px;height:80px}
  .img-btns{display:flex;gap:8px}
  .img-btns label,.img-btns button{
    flex:1;text-align:center;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:9px;border-radius:9px;cursor:pointer;font-size:13px;
  }
  .img-btns label:hover,.img-btns button:hover{border-color:var(--accent)}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions button{flex:1;padding:12px;border-radius:11px;border:none;cursor:pointer;font-size:15px;font-weight:600}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#d96a25);color:#1a1206}
  .btn-ghost{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)!important}
  .matched-tip{font-size:12px;color:var(--accent-2);margin-top:6px;min-height:16px}
  .toolbar{display:flex;justify-content:flex-end;margin-bottom:14px;gap:10px}
  .toolbar button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px}
  .toolbar button:hover{color:var(--text);border-color:var(--accent)}
  .toolbar .search-btn{background:linear-gradient(135deg,var(--blue),#3a7fd0);color:#06121f;border-color:transparent;font-weight:700}

  /* 搜索弹窗 */
  .modal.wide{max-width:680px}
  .search-bar{display:flex;gap:8px;margin-bottom:6px}
  .search-bar input{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:11px;font-size:15px}
  .search-bar input:focus{outline:none;border-color:var(--blue)}
  .search-bar button{background:linear-gradient(135deg,var(--blue),#3a7fd0);color:#06121f;border:none;padding:0 20px;border-radius:11px;cursor:pointer;font-weight:700;font-size:15px}
  .search-hint{font-size:12px;color:var(--muted);margin-bottom:14px;min-height:16px}
  .search-hint.err{color:var(--danger)}
  .quick-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .quick-tags span{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-size:12px;padding:4px 11px;border-radius:999px;cursor:pointer}
  .quick-tags span:hover{border-color:var(--blue);color:var(--text)}
  .res-list{display:flex;flex-direction:column;gap:12px;max-height:56vh;overflow:auto;padding-right:4px}
  .res{display:flex;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:12px;align-items:flex-start}
  .res .ricon{width:74px;height:74px;flex-shrink:0;background:#0e1116;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .res .ricon img{width:100%;height:100%;object-fit:cover}
  .res .ricon svg{width:48px;height:48px}
  .res .rbody{flex:1;min-width:0}
  .res .rtop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
  .res .rtop h4{margin:0;font-size:16px}
  .res .zb{font-size:11px;padding:2px 9px;border-radius:999px;background:rgba(240,136,62,.15);color:var(--accent);border:1px solid rgba(240,136,62,.3)}
  .res .src{font-size:10px;color:var(--muted);border:1px solid var(--line);padding:1px 7px;border-radius:999px}
  .res .src.online{color:var(--blue);border-color:rgba(88,166,255,.4)}
  .res .src.rec{color:#1a1206;background:linear-gradient(135deg,#ffd76f,#f0a83e);border-color:transparent;font-weight:700}
  .res.isrec{border-color:rgba(240,168,62,.5);background:linear-gradient(180deg,rgba(240,168,62,.07),var(--panel-2))}
  .res .rt{font-size:12px;color:var(--pink);margin:3px 0}
  .res .rw{font-size:12px;color:var(--accent-2);margin:3px 0}
  .res .rn{font-size:12px;color:var(--muted);line-height:1.55}
  .res .radd{align-self:center;background:linear-gradient(135deg,var(--accent),#d96a25);color:#1a1206;border:none;padding:9px 14px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;flex-shrink:0;white-space:nowrap}
  .res .radd:hover{filter:brightness(1.08)}
  .disclaimer{font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5;border-top:1px solid var(--line);padding-top:10px}

  /* history */
  .log-row{display:flex;gap:8px;margin-bottom:10px}
  .log-row input{flex:1}
  .log-row .date{flex:1.2}
  .chart{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 10px 6px;margin-bottom:14px}
  .chart .empty{color:var(--muted);text-align:center;font-size:13px;padding:24px 0}
  .hist-list{list-style:none;margin:0;padding:0;max-height:240px;overflow:auto}
  .hist-list li{
    display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:13px;
  }
  .hist-list li .hd{color:var(--muted);width:90px;flex-shrink:0}
  .hist-list li .hw{color:var(--accent-2);font-weight:700;width:70px;flex-shrink:0}
  .hist-list li .hn{color:var(--muted);flex:1}
  .hist-list li .hx{color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:6px}
  .hist-list li .hx:hover{color:var(--danger);background:rgba(248,81,73,.1)}
  .pr-badge{font-size:11px;background:rgba(240,136,62,.18);color:var(--accent);padding:1px 6px;border-radius:6px;margin-left:6px}
  /* ---- 手机端 ---- */
  @media(max-width:640px){
    body{-webkit-text-size-adjust:100%}
    header{padding:max(18px,env(safe-area-inset-top)) 16px 10px;flex-direction:column;align-items:stretch;gap:12px}
    header h1{font-size:21px}
    header .sub{font-size:12px}
    .stats{gap:8px}
    .stat{flex:1;min-width:0;padding:7px 6px}
    .stat b{font-size:17px}
    .wrap{padding:6px 14px calc(60px + env(safe-area-inset-bottom))}
    .tabs{gap:6px;margin:6px 0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;flex-wrap:nowrap}
    .tab{padding:9px 15px;font-size:14px;white-space:nowrap;flex-shrink:0}
    .toolbar{flex-wrap:wrap;gap:8px}
    .toolbar button{flex:1;min-width:46%;padding:10px;font-size:13px}
    .toolbar .search-btn{min-width:100%}
    .grid{grid-template-columns:1fr;gap:14px}
    .thumb{height:170px}
    .card-actions button{padding:10px 6px;font-size:13px}

    .overlay{padding:0;align-items:flex-end}
    .modal,.modal.wide{max-width:100%;width:100%;border-radius:20px 20px 0 0;max-height:94vh;padding:20px 16px calc(20px + env(safe-area-inset-bottom))}
    .modal h2{font-size:18px}
    .field input,.field textarea,.field select{font-size:16px}      /* ≥16px 防 iOS 自动放大 */
    .search-bar input{font-size:16px}

    .res{flex-wrap:wrap}
    .res .ricon{width:60px;height:60px}
    .res .rbody{flex:1 1 60%}
    .res .radd{width:100%;align-self:stretch;margin-top:4px;padding:11px}
    .res-list{max-height:60vh}

    .log-row{flex-direction:column}
    .hist-list{max-height:38vh}
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>🏋️‍♀️ 我的健身手册</h1>
    <div class="sub">分区记录 · 重量追踪 · 训练历史曲线 · 数据存在本地浏览器</div>
  </div>
  <div class="stats">
    <div class="stat"><b id="stat-total">0</b><span>动作总数</span></div>
    <div class="stat"><b id="stat-upper">0</b><span>上肢</span></div>
    <div class="stat"><b id="stat-core">0</b><span>核心</span></div>
    <div class="stat"><b id="stat-lower">0</b><span>下肢</span></div>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="toolbar">
    <button class="search-btn" onclick="openSearch()">🔍 搜索动作</button>
    <button onclick="exportData()">⬇ 导出备份</button>
    <button onclick="document.getElementById('importFile').click()">⬆ 导入备份</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- 编辑动作 Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">添加动作</h2>
    <div class="field">
      <label>所属分区</label>
      <select id="f-zone">
        <option value="upper">上肢</option>
        <option value="core">核心</option>
        <option value="lower">下肢</option>
      </select>
    </div>
    <div class="field">
      <label>动作名称</label>
      <input id="f-name" placeholder="例如：哑铃推胸 / 硬拉 / 保加利亚蹲" oninput="onNameInput()">
      <div class="matched-tip" id="matchTip"></div>
    </div>
    <div class="field">
      <label>训练重量 / 强度</label>
      <input id="f-weight" placeholder="例如：40kg × 4组×8次 / 自重">
    </div>
    <div class="field">
      <label>练哪里 · 哪里发力</label>
      <input id="f-target" placeholder="例如：臀大肌 · 臀部顶髋发力">
    </div>
    <div class="field">
      <label>动作要点 / 注意事项</label>
      <textarea id="f-notes" placeholder="例如：收紧核心、顶髋夹臀、膝盖对准脚尖…"></textarea>
    </div>
    <div class="field">
      <label>配图（自动匹配，可上传覆盖）</label>
      <div class="preview-box" id="previewBox"></div>
      <div class="img-btns">
        <label>📷 上传图片<input type="file" accept="image/*" style="display:none" onchange="onUpload(event)"></label>
        <button onclick="resetImg()">↺ 用自动配图</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveExercise()">保存</button>
    </div>
  </div>
</div>

<!-- 训练历史 Modal -->
<div class="overlay" id="histOverlay">
  <div class="modal">
    <h2 id="histTitle">训练历史</h2>
    <div class="chart" id="chart"></div>
    <div class="field" style="margin-bottom:10px">
      <label>记录一次训练</label>
      <div class="log-row">
        <input type="date" class="date" id="log-date">
        <input id="log-weight" placeholder="重量(kg)" inputmode="decimal">
      </div>
      <div class="log-row">
        <input id="log-note" placeholder="备注：组数×次数 / 感受（选填）">
      </div>
      <button class="btn-primary" style="width:100%;padding:11px;border:none;border-radius:10px;cursor:pointer;font-weight:600" onclick="addLog()">＋ 添加记录</button>
    </div>
    <ul class="hist-list" id="histList"></ul>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-ghost" onclick="closeHist()">关闭</button>
    </div>
  </div>
</div>

<!-- 搜索动作 Modal -->
<div class="overlay" id="searchOverlay">
  <div class="modal wide">
    <h2>🔍 搜索训练动作</h2>
    <div class="search-bar">
      <input id="searchInput" placeholder="输入动作 / 部位，如：卧推、臀、深蹲、bench、glute…" onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div class="quick-tags" id="quickTags"></div>
    <div class="search-hint" id="searchHint"></div>
    <div class="res-list" id="resList"></div>
    <div class="disclaimer">
      ⚠️ 建议重量为<b>新手/进阶参考区间</b>，不是医嘱——实际重量以你能<b>标准完成、最后 2 次略吃力</b>为准，循序渐进、量力而行。
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn-ghost" onclick="closeSearch()">关闭</button>
    </div>
  </div>
</div>

<script>
/* ---------- 内置 SVG 插图库 ---------- */
/* 女孩子版小人：扎马尾 + 粉色调 */
const ICONS = {
  bench:`<svg viewBox="0 0 100 100" fill="none" stroke="#ff6fae" stroke-width="4" stroke-linecap="round"><circle cx="15" cy="50" r="8"/><circle cx="85" cy="50" r="8"/><line x1="23" y1="50" x2="77" y2="50"/><rect x="36" y="62" width="28" height="6" rx="3" fill="#ff6fae" stroke="none"/><circle cx="50" cy="56" r="5"/><path d="M53 52 Q60 49 57 58"/></svg>`,
  dumbbell:`<svg viewBox="0 0 100 100" fill="#ff6fae" stroke="#ff6fae" stroke-width="4" stroke-linecap="round"><rect x="10" y="35" width="12" height="30" rx="3"/><rect x="78" y="35" width="12" height="30" rx="3"/><rect x="22" y="42" width="8" height="16" rx="2"/><rect x="70" y="42" width="8" height="16" rx="2"/><line x1="30" y1="50" x2="70" y2="50" stroke-width="6"/></svg>`,
  pullup:`<svg viewBox="0 0 100 100" fill="none" stroke="#ff6fae" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="15" y1="20" x2="85" y2="20"/><circle cx="50" cy="34" r="7"/><path d="M54 30 Q64 28 60 39"/><path d="M38 24 L38 20 M62 24 L62 20"/><path d="M50 41 L50 62 M50 48 L38 26 M50 48 L62 26 M50 62 L40 80 M50 62 L60 80"/><path d="M46 80 L40 90 M54 80 L60 90"/></svg>`,
  row:`<svg viewBox="0 0 100 100" fill="none" stroke="#ff6fae" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="30" cy="30" r="7"/><path d="M26 26 Q17 24 21 35"/><path d="M30 37 Q44 44 40 60 M30 40 L72 52 M72 52 L78 40 M40 60 L32 80 M40 60 L52 78"/><rect x="68" y="36" width="6" height="20" rx="3" fill="#ff6fae" stroke="none"/></svg>`,

const MATCH = [
  {kw:["飞鸟","夹胸","fly"], icon:"dumbbellFly", zone:"upper"},
  {kw:["推胸","卧推","平板","上斜","下斜","推举胸","bench","胸"], icon:"bench", zone:"upper"},
  {kw:["划船","row"], icon:"row", zone:"upper"},
  {kw:["引体","下拉","高位","pull","背阔","背"], icon:"pullup", zone:"upper"},
  {kw:["肩","推举","侧平举","前平举","arnold","shoulder","press","推肩"], icon:"shoulder", zone:"upper"},
  {kw:["弯举","二头","三头","臂屈伸","臂","curl","biceps","triceps"], icon:"biceps", zone:"upper"},
  {kw:["哑铃"], icon:"dumbbell", zone:"upper"},
  {kw:["卷腹","仰卧起坐","crunch","sit"], icon:"crunch", zone:"core"},
  {kw:["平板支撑","plank","支撑"], icon:"plank", zone:"core"},
  {kw:["腹","举腿","转体","核心","abs","russian","mountain"], icon:"abs", zone:"core"},
  {kw:["臀冲","臀桥","臀推","臀腿","臀","hip","glute"], icon:"glute", zone:"lower"},
  {kw:["硬拉","deadlift","rdl"], icon:"deadlift", zone:"lower"},
  {kw:["保加利亚","箭步","弓步","分腿","lunge","step","split"], icon:"lunge", zone:"lower"},
  {kw:["相扑","深蹲","蹲","squat"], icon:"squat", zone:"lower"},
  {kw:["腿","蹬","腿屈伸","勾腿","小腿","提踵","leg","calf"], icon:"leg", zone:"lower"},
  {kw:["跑","有氧","run","跳","波比","burpee"], icon:"running", zone:"core"},
];
function matchIcon(name){
  const n=(name||"").toLowerCase();
  for(const m of MATCH){if(m.kw.some(k=>n.includes(k.toLowerCase())))return m;}
  return {icon:"generic", zone:null};
}

/* ---------- 数据 ---------- */
const ZONES=[
  {id:"upper",label:"上肢",emoji:"💪"},
  {id:"core",label:"核心",emoji:"🔥"},
  {id:"lower",label:"下肢",emoji:"🦵"},
];
const KEY="myFitnessManual.v2";
let state=load();
let activeZone="lower";
let editId=null,tempImg=null,tempIcon="generic";
let histId=null;

function load(){
  try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&d.exercises)return d;}catch(e){}
  return {exercises: seed()};
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}

function seed(){

    // 上肢

    // 核心
    e({zone:"core",name:"平板支撑",weight:"自重 × 3组×60秒",icon:"plank",
       target:"腹横肌 / 整个核心 · 收紧腹部和臀部维持刚性",

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* ---------- 渲染 ---------- */
function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=ZONES.map(z=>{
    const c=state.exercises.filter(e=>e.zone===z.id).length;
    return `<div class="tab ${z.id===activeZone?'active':''}" onclick="switchZone('${z.id}')">
      ${z.emoji} ${z.label} <span class="cnt">${c}</span></div>`;
  }).join("");
}
function switchZone(z){activeZone=z;renderTabs();renderGrid();}
function iconSvg(name){return ICONS[name]||ICONS.generic;}

function renderGrid(){
  const grid=document.getElementById("grid");
  const list=state.exercises.filter(e=>e.zone===activeZone);
  let html=list.map(e=>{
    const media=e.img?`<img src="${e.img}" alt="">`:iconSvg(e.icon);
    const last=(e.history&&e.history.length)?e.history[e.history.length-1]:null;
    return `<div class="card">
      <div class="thumb" onclick="openModal('${e.id}')">
        ${media}<div class="upload-hint">✏️ 点击编辑</div>
      </div>
      <div class="card-body">
        <div class="card-title">
          <h3>${esc(e.name)}</h3>
          ${e.weight?`<span class="weight">${esc(e.weight)}</span>`:""}
        </div>
        ${e.target?`<div class="target"><b>📍 部位/发力：</b>${esc(e.target)}</div>`:""}
        <div class="notes">
          ${e.notes?`<span class="label">动作要点</span>${esc(e.notes)}`:'<span style="opacity:.5">暂无要点</span>'}
        </div>
        ${last?`<div class="last-log">🕘 最近：${last.date} · ${esc(last.weight)}kg${last.note?' · '+esc(last.note):''}</div>`:""}
        <div class="card-actions">
          <button class="log" onclick="openHist('${e.id}')">📈 记录(${e.history?e.history.length:0})</button>
          <button onclick="openModal('${e.id}')">编辑</button>
          <button class="del" onclick="delExercise('${e.id}')">删除</button>
        </div>
      </div>
    </div>`;
  }).join("");
  html+=`<div class="add-card" onclick="openModal()"><span class="plus">+</span>添加${zoneLabel(activeZone)}动作</div>`;
  grid.innerHTML=html;
  renderStats();
}
function zoneLabel(id){return (ZONES.find(z=>z.id===id)||{}).label||"";}
function renderStats(){
  document.getElementById("stat-total").textContent=state.exercises.length;
  document.getElementById("stat-upper").textContent=state.exercises.filter(e=>e.zone==="upper").length;
  document.getElementById("stat-core").textContent=state.exercises.filter(e=>e.zone==="core").length;
  document.getElementById("stat-lower").textContent=state.exercises.filter(e=>e.zone==="lower").length;
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])).replace(/\n/g,"<br>");}

/* ---------- 编辑弹窗 ---------- */
function openModal(id,prefill){
  editId=id||null;tempImg=null;tempIcon="generic";
  if(id){
    const e=state.exercises.find(x=>x.id===id);
    document.getElementById("modalTitle").textContent="编辑动作";
    document.getElementById("f-zone").value=e.zone;
    document.getElementById("f-name").value=e.name;
    document.getElementById("f-weight").value=e.weight||"";
    document.getElementById("f-target").value=e.target||"";
    document.getElementById("f-notes").value=e.notes||"";
    tempImg=e.img||null;tempIcon=e.icon||"generic";
  }else if(prefill){
    document.getElementById("modalTitle").textContent="添加动作（来自搜索）";
    document.getElementById("f-zone").value=prefill.zone||activeZone;
    document.getElementById("f-name").value=prefill.name||"";
    document.getElementById("f-weight").value=prefill.weight||"";
    document.getElementById("f-target").value=prefill.target||"";
    document.getElementById("f-notes").value=prefill.notes||"";
    tempImg=prefill.img||null;tempIcon=prefill.icon||"generic";
  }else{
    document.getElementById("modalTitle").textContent="添加动作";
    document.getElementById("f-zone").value=activeZone;
    ["f-name","f-weight","f-target","f-notes"].forEach(i=>document.getElementById(i).value="");
  }
  document.getElementById("matchTip").textContent="";
  updatePreview();
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){document.getElementById("overlay").classList.remove("show");}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});

function onNameInput(){
  const name=document.getElementById("f-name").value;
  const m=matchIcon(name);
  if(!tempImg){tempIcon=m.icon;updatePreview();}
  const tip=document.getElementById("matchTip");
  if(name.trim() && m.icon!=="generic"){
    tip.textContent="✓ 已自动匹配配图"+(m.zone?`，建议分区：${zoneLabel(m.zone)}`:"");
    if(m.zone && !editId) document.getElementById("f-zone").value=m.zone;
  }else tip.textContent="";
}
function updatePreview(){
  document.getElementById("previewBox").innerHTML=tempImg?`<img src="${tempImg}">`:iconSvg(tempIcon);
}
function onUpload(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{tempImg=r.result;updatePreview();document.getElementById("matchTip").textContent="✓ 已使用上传图片";};
  r.readAsDataURL(f);
}
function resetImg(){tempImg=null;onNameInput();updatePreview();}

function saveExercise(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){alert("请填写动作名称");return;}
  const obj={
    zone:document.getElementById("f-zone").value,
    name,
    weight:document.getElementById("f-weight").value.trim(),
    target:document.getElementById("f-target").value.trim(),
    notes:document.getElementById("f-notes").value.trim(),
    icon:tempIcon,img:tempImg,
  };
  if(editId){const e=state.exercises.find(x=>x.id===editId);Object.assign(e,obj);}
  else{obj.id=uid();obj.history=[];state.exercises.push(obj);activeZone=obj.zone;}
  save();closeModal();renderTabs();renderGrid();
}
function delExercise(id){
  const e=state.exercises.find(x=>x.id===id);
  if(!confirm(`确定删除「${e.name}」？`))return;
  state.exercises=state.exercises.filter(x=>x.id!==id);
  save();renderTabs();renderGrid();
}

/* ---------- 训练历史 ---------- */
function openHist(id){
  histId=id;
  const e=state.exercises.find(x=>x.id===id);
  document.getElementById("histTitle").textContent="📈 "+e.name+" · 训练历史";
  document.getElementById("log-date").value=new Date().toISOString().slice(0,10);
  // 预填上次重量，方便快速记录
  const last=e.history&&e.history.length?e.history[e.history.length-1]:null;
  document.getElementById("log-weight").value=last?last.weight:"";
  document.getElementById("log-note").value="";
  renderHist();
  document.getElementById("histOverlay").classList.add("show");
}
function closeHist(){document.getElementById("histOverlay").classList.remove("show");}
document.getElementById("histOverlay").addEventListener("click",e=>{if(e.target.id==="histOverlay")closeHist();});

function addLog(){
  const e=state.exercises.find(x=>x.id===histId);
  const date=document.getElementById("log-date").value;
  const weight=document.getElementById("log-weight").value.trim();
  const note=document.getElementById("log-note").value.trim();
  if(!date){alert("请选择日期");return;}
  if(weight===""){alert("请填写重量");return;}
  e.history.push({date,weight,note});
  e.history.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  // 把最近一次重量同步到卡片的“当前重量”单位部分（仅数值，保留用户单位习惯）
  save();renderHist();renderGrid();
  document.getElementById("log-note").value="";
}
function delLog(i){
  const e=state.exercises.find(x=>x.id===histId);
  e.history.splice(i,1);
  save();renderHist();renderGrid();
}
function renderHist(){
  const e=state.exercises.find(x=>x.id===histId);
  const h=e.history||[];
  // 列表
  let max=Math.max(...h.map(x=>parseFloat(x.weight)||0),0);
  const list=document.getElementById("histList");
  if(!h.length){list.innerHTML='<li style="color:#8b949e;justify-content:center">还没有记录，添加你的第一次训练吧 💪</li>';}
  else{
    list.innerHTML=h.slice().reverse().map((x,ri)=>{
      const i=h.length-1-ri;
      const isPR=(parseFloat(x.weight)||0)>=max && max>0;
      return `<li>
        <span class="hd">${x.date}</span>
        <span class="hw">${esc(x.weight)}kg${isPR?'<span class="pr-badge">PR</span>':''}</span>
        <span class="hn">${esc(x.note||'')}</span>
        <span class="hx" onclick="delLog(${i})">✕</span>
      </li>`;
    }).join("");
  }
  renderChart(h);
}
function renderChart(h){
  const box=document.getElementById("chart");
  const pts=h.map(x=>({d:x.date,v:parseFloat(x.weight)})).filter(p=>!isNaN(p.v));
  if(pts.length<1){box.innerHTML='<div class="empty">记录 2 次以上即可看到进步曲线</div>';return;}
  const W=420,H=150,pad=28;
  const vals=pts.map(p=>p.v);
  let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mn===mx){mn=mn-1;mx=mx+1;}
  const n=pts.length;
  const x=i=> n===1? W/2 : pad+(W-2*pad)*i/(n-1);
  const y=v=> H-pad-(H-2*pad)*(v-mn)/(mx-mn);
  let path="",dots="",labels="";
  pts.forEach((p,i)=>{
    const cx=x(i),cy=y(p.v);
    path+=(i===0?"M":"L")+cx.toFixed(1)+" "+cy.toFixed(1)+" ";
    dots+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4" fill="#f0883e"/>`;
    dots+=`<text x="${cx.toFixed(1)}" y="${(cy-9).toFixed(1)}" fill="#e6edf3" font-size="11" text-anchor="middle">${p.v}</text>`;
    if(i===0||i===n-1||n<=6)
      labels+=`<text x="${cx.toFixed(1)}" y="${H-8}" fill="#8b949e" font-size="9" text-anchor="middle">${p.d.slice(5)}</text>`;
  });
  const first=pts[0].v,lastv=pts[n-1].v,diff=(lastv-first);
  const trend=diff>0?`▲ +${diff.toFixed(1)}kg`:diff<0?`▼ ${diff.toFixed(1)}kg`:`持平`;
  const trendColor=diff>0?'#3fb950':diff<0?'#f85149':'#8b949e';
  box.innerHTML=`
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#8b949e;padding:0 6px 6px">
      <span>重量进步曲线（kg）</span>
      <span style="color:${trendColor};font-weight:700">较首次 ${trend}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%">
      <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#2a323d"/>
      <path d="${path}" fill="none" stroke="#f0883e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${labels}
    </svg>`;
}

/* ---------- 备份 ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="健身手册备份_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{const d=JSON.parse(r.result);if(!d.exercises)throw 0;
      if(!confirm("导入将覆盖当前数据，确定？"))return;
      state=d;
      state.exercises.forEach(e=>{if(!e.history)e.history=[];});
      save();renderTabs();renderGrid();alert("导入成功");
    }catch(e){alert("文件格式不正确");}
  };
  r.readAsText(f);ev.target.value="";
}

function openSearch(){
  document.getElementById("searchOverlay").classList.add("show");
  const q=document.getElementById("quickTags");
  q.innerHTML=["翘臀","上臀","臀中肌","马甲线","拜拜肉","美背","大腿后侧","蝴蝶肩","小腿"]
    .map(t=>`<span onclick="quickSearch('${t}')">${t}</span>`).join("");
  if(!document.getElementById("resList").innerHTML){
    document.getElementById("searchHint").textContent="输入想练的部位（如 上臀、翘臀、马甲线、拜拜肉），按效率推荐动作；也可直接搜动作名";
  }
  document.getElementById("searchInput").focus();
}
function closeSearch(){document.getElementById("searchOverlay").classList.remove("show");}
document.getElementById("searchOverlay").addEventListener("click",e=>{if(e.target.id==="searchOverlay")closeSearch();});
function quickSearch(t){document.getElementById("searchInput").value=t;doSearch();}

function localSearch(term){
  const t=term.toLowerCase().trim();
  if(!t)return KB.slice();
  return KB.filter(k=>{
    const hay=(k.name+" "+k.en+" "+(k.alias||[]).join(" ")+" "+k.target+" "+zoneLabel(k.zone)).toLowerCase();
    return hay.includes(t);
  });
}

/* 部位 -> 最高效动作（按训练效率排序）。具体部位排在通用部位前面 */

  {keys:["蝴蝶肩","肩","肩部","肩膀","天鹅颈","shoulder"], list:["站姿肩上推举","哑铃侧平举"]},
  {keys:["拜拜肉","蝴蝶袖","手臂后侧","大臂","三头"], list:["绳索三头下压"]},
  {keys:["二头","手臂前侧","手臂线条"], list:["哑铃二头弯举"]},
  {keys:["手臂","胳膊","arm"], list:["哑铃二头弯举","绳索三头下压","站姿肩上推举"]},
  {keys:["腰腹","侧腰","腹斜肌","水桶腰"], list:["俄罗斯转体","登山者","仰卧举腿"]},
  {keys:["马甲线","腹","腹肌","核心","小腹","肚子","abs","core"], list:["卷腹","仰卧举腿","平板支撑","俄罗斯转体","登山者"]},
];
function partMatch(term){
  const t=term.toLowerCase().trim();
  if(!t)return null;
  for(const p of PARTS){if(p.keys.some(k=>k.toLowerCase()===t))return p;}          // 精确匹配
  let best=null,len=0;
  for(const p of PARTS)for(const k of p.keys){const kl=k.toLowerCase();if(t.includes(kl)&&kl.length>len){best=p;len=kl.length;}}  // 输入含部位词，取最具体
  if(best)return best;
  for(const p of PARTS){if(p.keys.some(k=>k.toLowerCase().includes(t)))return p;}  // 部位词含输入（片段）
  return null;
}

function doSearch(){
  const term=document.getElementById("searchInput").value.trim();
  const hint=document.getElementById("searchHint");
  hint.className="search-hint";
  if(!term){renderResults(KB.slice(),[]);hint.textContent=`动作库共 ${KB.length} 个动作`;return;}
  const part=partMatch(term);
  if(part){
    const recs=part.list.map(n=>KB.find(k=>k.name===n)).filter(Boolean).map((k,i)=>Object.assign({},k,{_rec:i+1}));
    const recNames=new Set(recs.map(r=>r.name));
    const others=localSearch(term).filter(k=>!recNames.has(k.name));
    renderResults(recs.concat(others),[]);
    let msg=`⭐ 练「${term}」最高效的动作，已按推荐顺序排列`;
    if(others.length)msg+=`；另有 ${others.length} 个相关动作`;
    hint.textContent=msg;
    return;
  }
  const local=localSearch(term);
  renderResults(local,[]);
  hint.textContent=local.length?`找到 ${local.length} 个动作`:"没有匹配的动作，换个部位或动作名试试～";
}


/* 按部位生成通用中文指导（用于联网结果） */
function zoneTips(zone){
  if(zone==="lower")return{
    target:"下肢 / 臀腿 · 顶髋夹臀、膝盖对准脚尖发力",
    weight:"参考：选能标准完成 8–12 次、最后 2 次略吃力的重量",
    notes:"下蹲或下放控制节奏，膝盖与脚尖同向不要内扣，起身时顶髋夹臀；先把动作做到位再加重量。"};
  if(zone==="core")return{
    target:"核心 · 收紧腹部、脊柱保持中立",
    weight:"以自重为主，可逐步增加配重或时长",
    notes:"保持均匀呼吸，靠腹部发力别用腰背代偿，宁慢勿快、专注感受腹部收缩。"};
  return{
    target:"上肢目标肌群 · 沉肩收肩胛、目标肌主动发力",
    weight:"参考：选能标准完成 8–12 次、最后 2 次略吃力的重量",
    notes:"全程控制离心、避免借力甩动；动作幅度到位优先于上大重量，顶峰适当收缩。"};
}
function renderResults(local,extra){
  const box=document.getElementById("resList");
  const card=(d,online)=>{
    const media=d._img?`<img src="${d._img}">`:(d.img?`<img src="${d.img}">`:iconSvg(d.icon||matchIcon(d.name).icon));
    const zone=d.zone||matchIcon(d.name).zone||"upper";
    const tips=zoneTips(zone);
    const data={name:d.name,zone:zone,icon:d.icon||matchIcon(d.name).icon,
      target:d.target||tips.target,
      weight:d.weight||tips.weight,
      notes:d.notes||tips.notes,
      img:d._img||d.img||null};
    const badge=d._rec?`<span class="src rec">⭐ 高效 #${d._rec}</span>`:`<span class="src">动作库</span>`;
    return `<div class="res${d._rec?' isrec':''}">
      <div class="ricon">${media}</div>
      <div class="rbody">
        <div class="rtop">
          <h4>${esc(d.name)}</h4>
          <span class="zb">${zoneLabel(zone)}</span>
          ${badge}
        </div>
        <div class="rt">📍 ${esc(data.target)}</div>
        <div class="rw">🏋️ 建议重量：${esc(data.weight)}</div>
        <div class="rn">${esc(data.notes)}</div>
      </div>
      <button class="radd" onclick='addFromSearch(${JSON.stringify(data).replace(/'/g,"&#39;")})'>➕ 加入手册</button>
    </div>`;
  };
  let html=local.map(d=>card(d,false)).join("");
  html+=(extra||[]).map(d=>card(d,true)).join("");
  box.innerHTML=html||'<div style="color:#8b949e;text-align:center;padding:30px">没有找到匹配的动作，换个关键词试试～</div>';
}

function addFromSearch(data){
  closeSearch();
  openModal(null,data);
}
